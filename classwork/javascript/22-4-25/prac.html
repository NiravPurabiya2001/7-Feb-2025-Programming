<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-size: 50px;
        }
    </style>
</head>
<body>
    <script>
      let i,j,k,l
      for(i=1;i<=5;i++)
      {
        for(j=1;j<=5-i;j++)
        {
            document.write("&nbsp;&nbsp")
        }
        for(k=1;k<=i;k++)
        {
            document.write("*")
        }
        for(l=2;l<=i;l++)
        {
            document.write("*")
        }
        document.write("<br>")
      }
    </script>
</body>
</html>
