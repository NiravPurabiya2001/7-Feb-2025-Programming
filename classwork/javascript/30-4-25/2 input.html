<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/30-4-25/style.css">
</head>
<body>
    <div class="calculator">
    <input type="text" id="num1" placeholder="ENTER NUMBER">
    <input type="text" id="num2" placeholder="ENTER NUMBER">
    <button onclick="add()">ADDITION</button>
    <button onclick="sub()">SUBTRACTION</button>
    <button onclick="mul()">MULTIFLICATION</button>
    <button onclick="div()">DIVISION</button>
    <h1 id="h1"></h1>
</div>

    <script>
       
            let n1 = document.getElementById("num1")
            let n2 = document.getElementById("num2")

         function add(){
            let add = parseInt(num1.value)+parseInt(num2.value)
            document.getElementById("h1").innerHTML = `ADDITION IS :${add}`

         }
         function sub(){
            let add = parseInt(num1.value)-parseInt(num2.value)
            document.getElementById("h1").innerHTML = `SUBTRACTION IS :${add}`

         }
         function mul(){
            let add = parseInt(num1.value)*parseInt(num2.value)
            document.getElementById("h1").innerHTML = `MULTIFLICATION IS :${add}`

         }
         function div(){
            let add = parseInt(num1.value)/parseInt(num2.value)
            document.getElementById("h1").innerHTML = `DIVISION IS :${add}`

         }
        
    </script>
</body>
</html>
