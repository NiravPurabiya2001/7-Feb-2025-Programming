<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1" onmouseover="myname()" onmouseout="out()">hello welcome</h1>

    <script>
        function myname()
        {
            document.getElementById("h1").innerHTML = "python"
        }
        function out()
        {
            document.getElementById("h1").innerHTML = "hello welcome"
        }
    </script>
    
</body>
</html>
