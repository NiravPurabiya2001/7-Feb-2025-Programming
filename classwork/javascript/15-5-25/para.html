<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     function greet(username)
     {
        document.write(username)

        document.write("hello," + username + "!");
     }

     let username = prompt("enter name:")
     greet(username)

    </script>
</body>
