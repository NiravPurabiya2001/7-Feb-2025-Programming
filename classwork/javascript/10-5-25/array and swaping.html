<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- array is a collection of different ypes of data in a single variable. -->
    <script>
        // let a = [1,2,3,4,5,6]
        // position of array starts with 0
        // console.log(a[1])


        let a = [56,34,21,17,19,22]

        for(i=0;i<6;i++)
        {
            for(j=i+1;i<6;j++)
            {
                if(a[i]<a[j])
                {
                    let temp = a[i]
                    a[i]=a[j]
                    a[j]=temp
                }
            }
        }
        for(i=0;i<6;i++)
        {
            document.write(a[i])
        }
    </script>

</body>
</html>
