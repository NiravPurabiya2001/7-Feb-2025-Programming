<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registaration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Registaration Form</h1>

<form action="#" method="post">

    First Name:<br>
    <input type="text" name="firstname" placeholder="Enter your first name"><br>

    Last Name:<br>
    <input type="text" name="lastname" placeholder="Enter your last name"><br>

    Email:<br>
    <input type="email" name="email" placeholder="it should contain @"><br>

    Mobile:<br>
    <input type="tel" name="mobile" placeholder="only 10 digits are allowed" maxlength="10"><br>

    Gender:<br>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female<br>

    Date Of Birth:<br>
    <input type="date" name="dob"><br>

    Address:<br>
    <textarea name="address" rows="5" cols="30"></textarea><br>

    City:<br>
    <input type="text" name="city"><br>

    Area PIN:<br>
    <input type="text" name="pin"><br>

    State:<br>
    <input type="text" name="state"><br>

    Qualification:<br>
    <select name="qualification">
        <option value="">Select Qualification</option>
        <option value="ug">Under Graduate</option>
        <option value="pg">Post Graduate</option>
        <option value="diploma">Diploma</option>
    </select><br>

    Specialization:<br>
    <input type="checkbox" name="spec" value="cs"> Computer Science<br>
    <input type="checkbox" name="spec" value="it"> Information Technology<br>
    <input type="checkbox" name="spec" value="ca"> Computer Architecture<br>
    <input type="checkbox" name="spec" value="tc"> Tele Communication<br>

    Password:<br>
    <input type="password" name="password"><br><br>

    <input type="submit" value="Registered">

</form>

</body>
</html>
