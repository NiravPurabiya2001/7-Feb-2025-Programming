<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Bio-Stack Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1>Bio-Stack Builder</h1>
        <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
    </header>

    <main class="main-content">
        <!-- Editor Section -->
        <section class="editor-section">
            <h2>Add New Link</h2>
            <form id="linkForm">
                <div class="form-group">
                    <label for="linkTitle">Title</label>
                    <input type="text" id="linkTitle" placeholder="e.g., My Portfolio" required>
                </div>
                <div class="form-group">
                    <label for="linkUrl">URL</label>
                    <input type="url" id="linkUrl" placeholder="https://example.com" required>
                    <div id="urlError" class="error-msg">URL must start with https://</div>
                </div>
                <button type="submit" class="btn btn-primary">Add Link</button>
            </form>
            
            <div class="manage-links">
                <h2>Manage Links</h2>
                <div id="adminLinkList" class="admin-link-list">
                    <!-- Links will be populated here -->
                </div>
            </div>
        </section>

        <!-- Preview Section -->
        <section class="preview-section">
            <div class="phone-mockup">
                <div class="phone-screen">
                    <div class="profile-header">
                        <div class="profile-avatar"></div>
                        <h3>@creator</h3>
                        <p>Welcome to my Bio-Stack!</p>
                    </div>
                    <div id="previewLinkList" class="preview-link-list">
                        <!-- Clickable links will be populated here -->
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
