<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Booking Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Restaurant Booking</h2>
        <form id="bookingForm" action="#" method="post">
            <div class="form-group">
                <label for="userName">User Name:</label>
                <input type="text" id="userName" name="userName" required>
            </div>
            
            <div class="form-group">
                <label for="mobile">Mobile Number:</label>
                <input type="tel" id="mobile" name="mobile" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="persons">No of person:</label>
                <input type="number" id="persons" name="persons" min="1" required>
            </div>
            
            <div class="form-group">
                <label for="bookingChoice">Choice of booking:</label>
                <select id="bookingChoice" name="bookingChoice" onchange="handleBookingChoice()" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="full">Full day booking</option>
                    <option value="half">Half day booking</option>
                    <option value="hourly">Hourly booking</option>
                </select>
            </div>
            

            <div id="dynamicFieldsContainer"></div>
            
            <div class="form-group" style="margin-top: 1.5rem;">
                <button type="submit" class="submit-btn">Book Now</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
