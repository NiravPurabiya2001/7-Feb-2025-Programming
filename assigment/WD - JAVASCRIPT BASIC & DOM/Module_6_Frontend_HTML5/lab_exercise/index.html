<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Features Lab</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        section { margin-bottom: 40px; }
        canvas { border: 1px solid #000; }
    </style>
</head>
<body>

    <h1>HTML5 Lab Exercise</h1>

    <section>
        <h2>1. HTML5 Video & Audio Tag (Muted, Autoplay, Loop)</h2>
        <!-- Video element -->
        <video width="400" controls muted autoplay loop>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        <br><br>
        <!-- Audio element -->
        <audio controls muted autoplay loop>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <section>
        <h2>2. HTML5 Canvas Tag</h2>
        <canvas id="myCanvas" width="200" height="200"></canvas>
        <script>
            var c = document.getElementById("myCanvas");
            var ctx = c.getContext("2d");
            
            // Draw a rectangle
            ctx.fillStyle = "#FF0000";
            ctx.fillRect(20, 20, 100, 50);

            // Draw a circle
            ctx.beginPath();
            ctx.arc(100, 120, 40, 0, 2 * Math.PI);
            ctx.fillStyle = "blue";
            ctx.fill();
            ctx.stroke();
        </script>
    </section>

    <section>
        <h2>3. HTML5 SVG Tag</h2>
        <!-- Draw shapes using SVG -->
        <svg width="300" height="200" style="border: 1px solid #ccc;">
            <!-- Circle -->
            <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
            <!-- Rectangle -->
            <rect x="120" y="20" width="100" height="60" style="fill:blue;stroke:black;stroke-width:2;opacity:0.5" />
            <!-- Polygon (Triangle) -->
            <polygon points="50,180 100,100 150,180" style="fill:lime;stroke:purple;stroke-width:1" />
        </svg>
    </section>

</body>
</html>
