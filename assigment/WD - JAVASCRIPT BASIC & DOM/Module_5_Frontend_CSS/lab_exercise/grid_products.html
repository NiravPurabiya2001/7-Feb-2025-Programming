<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Products</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
            gap: 20px; /* spacing between grid items */
            max-width: 1000px;
            margin: 0 auto;
        }

        .product-card {
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #333;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Product Grid</h2>
    
    <div class="grid-container">
        <!-- Card 1 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product" class="product-image">
            <h3 class="product-title">Product 1</h3>
            <p class="product-price">$19.99</p>
        </div>
        <!-- Card 2 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product" class="product-image">
            <h3 class="product-title">Product 2</h3>
            <p class="product-price">$29.99</p>
        </div>
        <!-- Card 3 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product" class="product-image">
            <h3 class="product-title">Product 3</h3>
            <p class="product-price">$39.99</p>
        </div>
        <!-- Card 4 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product" class="product-image">

        </div>
        <!-- Card 5 -->

        <!-- Card 6 -->

</body>
</html>
