<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; display: flex; flex-direction: column; }
        
        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex; /* Flex container for sidebar and main */
            flex: 1; /* Takes up remaining height */
            flex-direction: row; /* Main axis is horizontal */
        }

        .sidebar {
            background-color: #f4f4f4;
            width: 250px;
            padding: 20px;
            /* Flex item */
        }

        .main-content {
            background-color: #fff;
            padding: 20px;
            flex: 1; /* Takes up remaining width */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Aligns items vertically center */
            align-items: center; /* Aligns items horizontally center */
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* Stack on smaller screens */
            }
            .sidebar {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Website Header</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>Sidebar</h2>
            <ul>
                <li>Link 1</li>
                <li>Link 2</li>
                <li>Link 3</li>
            </ul>
        </aside>
        
        <main class="main-content">
            <h2>Main Content Area</h2>
            <p>This layout is built using Flexbox. The container uses `display: flex`. The sidebar has a fixed width, and the main content uses `flex: 1` to fill the rest of the space.</p>
        </main>
    </div>

    <footer>
        <p>Website Footer &copy; 2026</p>
    </footer>

</body>
</html>
