<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card (Box Model)</title>
    <style>
        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .profile-card {
            background-color: white;
            /* Box Model properties */
            width: 300px; /* content width if content-box, total width if border-box */
            padding: 20px;
            margin: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            
            /* demonstrating box-sizing */
            box-sizing: border-box; /* padding and border are included in the width */
            
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #007bff;
            padding: 3px; /* Space between image and border */
            margin-bottom: 15px; /* Margin pushes the text below it */
            box-sizing: content-box; /* default behavior, border and padding add to 100px width */
        }

        .profile-name {
            margin: 0 0 10px 0;
            color: #333;
        }

        .profile-bio {
            margin-bottom: 20px;
            color: #666;
            line-height: 1.5;
        }

        .follow-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%; /* Fill the container */
            box-sizing: border-box;
        }

        .follow-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-image">
        <h3 class="profile-name">Jane Doe</h3>
        <p class="profile-bio">Frontend Developer passionate about UI/UX and creating beautiful, responsive web applications.</p>
        <button class="follow-btn">Follow</button>
    </div>

</body>
</html>
