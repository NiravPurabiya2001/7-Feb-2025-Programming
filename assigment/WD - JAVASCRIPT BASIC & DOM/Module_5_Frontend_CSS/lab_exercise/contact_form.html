<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Contact Form</title>
    <link rel="stylesheet" href="contact_form.css">
</head>
<body>

    <div id="contact-form-container">
        <h2 style="text-align: center; margin-top: 0;">Contact Us</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" class="form-input" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" class="form-input" required placeholder="Your message..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
        </form>
    </div>

</body>
</html>
