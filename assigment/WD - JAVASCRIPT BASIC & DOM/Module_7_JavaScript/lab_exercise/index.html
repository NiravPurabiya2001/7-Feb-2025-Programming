<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lab Exercises</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; transition: background-color 0.5s; }
        section { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .clock { font-size: 24px; font-weight: bold; color: #d9534f; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>JavaScript Lab Exercises</h1>
    <p>Check the browser console (F12) for the output of tasks like variables, loops, arrays, and objects!</p>

    <section>
        <h2>DOM Manipulation & Events</h2>
        <p id="myParagraph">Hello, World!</p>
        <button id="domBtn">Change Text & Color</button>
    </section>

    <section>
        <h2>Event Listener Task</h2>
        <button id="alertBtn">Click Me for Alert</button>
    </section>

    <section>
        <h2>Digital Clock (setInterval)</h2>
        <div id="clockDisplay" class="clock">Loading time...</div>
    </section>

    <section>
        <h2>Control Flow & Error Handling</h2>
        <button onclick="checkNumber()">Check Positive/Negative (Prompt)</button>
        <button onclick="divideByZeroError()">Trigger Error Handling (Divide by Zero)</button>
    </section>

    <!-- External Script -->
    <script src="app.js"></script>
    <script>
        // Intro Task (Alert on load)
        alert("Welcome to JavaScript!");
    </script>
</body>
</html>
