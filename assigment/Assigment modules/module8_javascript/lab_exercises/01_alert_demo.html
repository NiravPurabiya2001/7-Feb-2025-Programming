<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Lab 01 – Alert on Load</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    h1 { color: #60a5fa; margin-bottom: 12px; }
    p { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <h1>JavaScript Introduction</h1>
    <p>An alert was displayed when this page loaded.</p>
    <p>Open the browser console (F12) to see more messages.</p>
  </div>
  <script>
    // Lab Task: Display an alert box with a welcome message when the page loads.
    alert("Welcome to JavaScript!");
    // Additional: Log messages to console
    console.log("Page loaded successfully!");
    console.log("JavaScript is running in the browser.");
  </script>
</body>
</html>
