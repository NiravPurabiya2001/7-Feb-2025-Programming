<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styled Contact Form – CSS Lab</title>
  <link rel="stylesheet" href="contact_form.css" />
</head>
<body>
  <div id="contact-form-wrapper">
    <h1>Contact Us</h1>
    <p class="form-subtitle">We'd love to hear from you. Fill in the form below.</p>

    <form action="#" method="POST">
      <div class="form-group">
        <label for="fullName">Full Name <span class="required">*</span></label>
        <input type="text" id="fullName" name="fullName" placeholder="e.g. John Doe" required minlength="3" maxlength="60" pattern="[A-Za-z\s]+" />
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="e.g. john@example.com" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number <span class="required">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="e.g. +91 9876543210" required pattern="[+]?[0-9\s\-]{7,15}" />
      </div>

      <div class="form-group">
        <label for="subject">Subject <span class="required">*</span></label>
        <select id="subject" name="subject" required>
          <option value="" disabled selected>-- Select a subject --</option>
          <option value="general">General Inquiry</option>
          <option value="support">Technical Support</option>
          <option value="billing">Billing &amp; Payments</option>
          <option value="feedback">Feedback</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="message" placeholder="Write your message here..." required minlength="20" maxlength="1000"></textarea>
      </div>

      <button type="submit" id="submit-btn">Send Message</button>
    </form>
  </div>
</body>
</html>
